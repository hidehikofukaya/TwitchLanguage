name = "twitchlaunguage-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPABASE_URL = "https://opbilttrjwowvqpbvctv.supabase.co"
CORS_ORIGIN = "chrome-extension://*"

# Secrets (set via wrangler secret put):
#   ANTHROPIC_API_KEY
#   SUPABASE_ANON_KEY          ← 新UI: "Publishable key" (sb_publishable_...)
#   SUPABASE_SERVICE_ROLE_KEY  ← 新UI: "Secret key" (sb_secret_wd_...)
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET

[build]
command = "npm install"
